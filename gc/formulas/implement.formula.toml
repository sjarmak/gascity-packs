description = """
Convoy-first implementation entry point.

Core injects the reserved graph.v2 `convoy_id` target. The formula never
declares that variable itself and rejects legacy bead/issue targeting before it
creates drain work.
"""
formula = "implement"
version = 2
contract = "graph.v2"
target_required = true

[vars]
[vars.context_path]
description = "Optional context bundle path with name/path/description entries."
default = ""

[vars.drain_policy]
description = "Implementation drain policy: separate or same-session."
default = "separate"

[vars.worker_target]
description = "Optional worker target for separate item implementation."
default = ""

[vars.summary_path]
description = "Optional aggregate implementation summary path."
default = ""

[vars.push]
description = "Set true to allow publish push after direct implementation succeeds."
default = "false"

[vars.open_pr]
description = "Set true to allow publish PR creation after direct implementation succeeds."
default = "false"

[[steps]]
id = "prepare"
title = "Validate implementation convoy"
description = """
Validate graph.v2 target state before side effects.

Requirements:
- read reserved `convoy_id` from core graph context
- fail if the target is not a convoy or normalized singleton convoy
- reject legacy `issue`, `bead_id`, or user-supplied `convoy_id` inputs
- validate `context_path` with `{{pack_root}}/assets/scripts/validate_context_bundle.py` when set
- reject `drain_policy` values other than `separate` or `same-session`
- inspect the convoy target branch, defaulting to the repo default branch
- write a run-status artifact if `summary_path` or artifact root is provided

Close pass only after no workflow roots, drain controls, routed beads,
worktrees, refs, or publish records have been created before validation.
"""

[[steps]]
id = "drain-separate"
title = "Drain implementation convoy into separate sessions"
needs = ["prepare"]
condition = "{{drain_policy}} == separate"
description = """
Use core graph.v2 drain to materialize one full `do-work` lifecycle per
selected non-convoy runnable member. The pack does not enumerate members before
formula instantiation; core owns drain-unit convoy creation and manifest state.
"""

[steps.drain]
context = "separate"
formula = "do-work"
member_access = "exclusive"

[[steps]]
id = "drain-same-session"
title = "Drain implementation convoy in one shared session"
needs = ["prepare"]
condition = "{{drain_policy}} == same-session"
description = """
Same-session is pack policy. Emit core shared drain, require one executable item
lane, and fail closed if core cannot prove dependency-safe manifest order.
"""

[steps.drain]
context = "shared"
formula = "do-work-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

[[steps]]
id = "wait-for-drain"
title = "Wait for drain completion"
needs = ["drain-separate", "drain-same-session"]
description = """
Wait on the core drain manifest. Success requires every selected runnable
anchor to be terminal-success or already closed. Failed, skipped, abandoned, or
still-open anchors make implement fail and write the aggregate summary.
Do not close the input convoy head.
"""

[[steps]]
id = "summarize"
title = "Write implementation summary"
needs = ["wait-for-drain"]
description = """
Write the aggregate implementation summary, including selected anchors, drain
policy, item result classes, report paths, commit refs when available, and any
operator recovery instructions. Direct implement does not run gap-analysis or
review loops.
"""
