description = """
Pre-push gate for outgoing PRs. Runs three stages — simplify, iterate
self-review until clean, mechanical contributor checks — and produces a
combined readiness report. **STOPS at the report.** Does NOT push, does
NOT open a PR.

The point: catch the structural and correctness defects before the
maintainer's review cycle, so the contributor PR lands with zero or
near-zero review comments.

A coding agent (polecat or equivalent) follows the steps in order. The
agent CAN modify files in stages 1 and 2 (simplify + review fixes); all
other stages are read-only.

## Contract

1. Caller slings with `--var branch=<name>` (or omits to use current branch)
2. Agent works through 4 sequential stages
3. Combined readiness report written to `.gc/pr-pipeline/ship/<branch>.md`
4. Root-bead notes record `readiness:` (ready | blocked) + `blockers:`
5. Agent exits — no push, no PR open

The caller decides whether to push based on the report. This formula
never runs `git push` or `gh pr create`.

## Failure Modes

| Situation | Action |
|-----------|--------|
| Stage 1 simplify breaks the build | Revert simplify, note in report, continue |
| Stage 2 doesn't converge in 3 iterations | Report as blocked, list remaining findings |
| Stage 3 mechanical gate fails | Report as blocked, list which gate |
| All review models rate-limited | Report as blocked, no shipping |"""
formula = "mol-pr-ship"
version = 1

[vars]
[vars.branch]
description = "Branch to gate (defaults to current branch)"
default = ""

[vars.skip_simplify]
description = "Set to 'true' to skip Stage 1 simplify pass"
default = "false"

[[steps]]
id = "intake"
title = "Resolve branch and prepare report path"
description = """
Confirm we're in a git repo, resolve the branch, and prepare workspace.

```bash
ROOT_ID=$(bd mol current --json | jq -r '.molecule_id')
REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null) || {
    echo "Not in a git repository — cannot ship."
    bd close "$ROOT_ID" --reason "not a git checkout"
    exit 1
}
cd "$REPO_ROOT"

BRANCH="{{branch}}"
if [ -z "$BRANCH" ]; then
    BRANCH=$(git branch --show-current)
fi
if [ -z "$BRANCH" ] || [ "$BRANCH" = "HEAD" ]; then
    echo "On detached HEAD or no branch — cannot ship."
    bd close "$ROOT_ID" --reason "no branch resolved"
    exit 1
fi

# Refuse to ship from main / default branch.
DEFAULT=$(git remote show origin 2>/dev/null | sed -n 's/.*HEAD branch: //p' || echo "main")
if [ "$BRANCH" = "$DEFAULT" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
    echo "Cannot ship from default branch ($BRANCH). Create a feature branch first."
    bd close "$ROOT_ID" --reason "on default branch"
    exit 1
fi

mkdir -p .gc/pr-pipeline/ship
SAFE=$(echo "$BRANCH" | tr '/' '_')
REPORT_PATH=".gc/pr-pipeline/ship/${SAFE}.md"
bd update "$ROOT_ID" --notes "branch: $BRANCH
report_path: $REPORT_PATH
status: in_progress"
```

**Exit criteria:** Branch resolved, report path set, not on default branch.
"""

[[steps]]
id = "simplify"
title = "Stage 1 — simplify the diff"
needs = ["intake"]
description = """
Clean up the diff — remove dead code, consolidate duplicates, improve
readability. This stage CAN modify files; if changes break the build,
revert.

If `{{skip_simplify}}` is `true`, record `simplify: skipped` and
proceed to the next step.

Otherwise, walk the diff and look for:

- **Dead code**: helpers added but never called; commented-out blocks
- **Duplicated logic**: the same operation in two places that could be
  one function
- **Over-abstracted code**: interfaces with one implementation,
  excessive indirection
- **Naming improvements**: variables/functions whose names hide their
  purpose
- **Unused imports / dependencies**

Apply changes in-place (small commits OK):

```bash
# After each simplification commit:
git diff --stat HEAD~1 HEAD
```

Verify the build still passes:

```bash
# The exact build command depends on the repo's stack. Try in order:
if [ -f Makefile ] && grep -q "^build:" Makefile; then
    make build
elif [ -f go.mod ]; then
    go build ./...
elif [ -f package.json ] && [ -f tsconfig.json ]; then
    npx tsc --noEmit
elif [ -f Cargo.toml ]; then
    cargo build
elif [ -f setup.py ] || [ -f pyproject.toml ]; then
    python -c "import compileall; compileall.compile_dir('.', quiet=1)"
fi
```

If the build breaks after simplify, revert the simplify commits:

```bash
git reset --hard HEAD~<N>  # N = number of simplify commits
echo "[ship] Stage 1 reverted — simplify broke the build"
```

Record stage outcome:

```bash
ROOT_ID=$(bd mol current --json | jq -r '.molecule_id')
bd update "$ROOT_ID" --notes "simplify: <complete | reverted | skipped>
simplify_commits: <sha1>,<sha2>,..."
```

**Exit criteria:** Diff simplified (or skipped/reverted), build green,
outcome recorded.
"""

[[steps]]
id = "review-iterate"
title = "Stage 2 — multi-agent adversarial review via Agent Teams"
needs = ["simplify"]
description = """
Stage 2 — multi-agent adversarial review via Claude Code Agent
Teams. The polecat (you) is the team lead; you spawn 3-4 reviewer
teammates referencing existing subagent definitions, then conduct
a structured debate where teammates challenge each other's findings
before reporting consensus. This is stronger than one-shot
synthesis because reviewers can interrogate each other's
blocker/major flags.

Requires CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 in your env
(configured at agent.toml level for the polecat pool). Verify
before spawning the team:

    [[ "$CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS" = "1" ]] || {
        bd update "$ROOT_ID" --notes "review_mode: blocked-env-missing"
        echo "review-iterate blocked: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS not set in env"
        exit 2
    }

## Iteration loop (cap at 3 iterations)

1. Prepare the diff context:

       git diff origin/main..HEAD > /tmp/pr-ship-${BRANCH//\\//-}-iter${ITER_N}.patch

2. Create the agent team with a natural-language spawn instruction.
   The "competing hypotheses" pattern from the Agent Teams docs:

       Create an agent team to adversarially review the staged branch
       <BRANCH> for regression risk. Spawn 4 reviewer teammates by
       name, each referencing an existing subagent definition:

         - reviewer-go using go-reviewer agent type
         - reviewer-sec using security-reviewer agent type
         - reviewer-code using code-reviewer agent type
         - reviewer-codex using codex:codex-rescue agent type

       Each teammate reads /tmp/pr-ship-<...>-iterN.patch and reviews
       against the 11-category rubric (Behavioral Correctness,
       Contract Fidelity, Change Impact / Blast Radius, Concurrency,
       Error Handling, Security, Resource Lifecycle, Release Safety,
       Test Evidence, Architectural Consistency, Debuggability) with
       severity (blocker/major/minor/nit) + confidence (high/medium/low).

       After each teammate produces an initial review, have them
       CHALLENGE each other's blocker and major findings directly via
       teammate messaging — like a scientific debate. Each teammate
       attempts to disprove the others' high-severity flags. The
       review that survives debate is the final report.

       Lead (you, polecat) waits for all teammates to finish the
       debate phase, synthesizes the post-debate consensus, and writes
       the per-iteration scorecard.

3. Wait for the team's debate to finish. The shared task list
   coordinates progress. Use the `TeammateIdle` checkpoint when
   available.

4. Synthesize: read the consensus output and classify remaining
   findings as blocker / major / minor.

5. If any blocker or major remains → fix in-place, commit
   (`git commit -m "fix: ..."`), increment ITER_N, go to step 1.
   Cap at 3 iterations.

6. Record per-iteration state:

       ROOT_ID=$(bd mol current --json | jq -r '.molecule_id')
       bd update "$ROOT_ID" --notes "review_iter_$ITER_N: blockers=<n>, majors=<n>, minors=<n>
       review_fix_commits_$ITER_N: <sha>,<sha>,...
       review_team_synthesis_$ITER_N: <path to synthesis report>"

7. Clean up the team before exiting the step. Tell the lead to
   "Clean up the team" — always cleanup via the lead, never via a
   teammate (per Agent Teams docs warning).

## Exit criteria

Same as today's formula:
  - Converged: no blockers, no majors remain. Minors OK to ship.
  - Cap-hit: iteration 3 still has blockers/majors. Report blocked
    at Stage 4 with `review_status: not_converged` on the root bead.

After convergence (or 3-iter cap):

    bd update "$ROOT_ID" --notes "review_status: <converged | not_converged>
    review_final: blockers=<n>, majors=<n>, minors=<n>"

## Fallback

If agent teams cannot be created in this session (env var unset,
version mismatch, lead-already-managing-a-team), fall back to
spawning the same 4 reviewers as standalone parallel subagents
(single Agent tool message with 4 calls), synthesize without the
debate phase, and note `review_mode: subagent-fallback` on the
bead. Subagent fallback is degraded but functional.
"""

[[steps]]
id = "contributor-check"
title = "Stage 3 — mechanical gates"
needs = ["review-iterate"]
description = """
Read-only mechanical checks. The exact gate set depends on the repo's
stack; run what's available.

```bash
ROOT_ID=$(bd mol current --json | jq -r '.molecule_id')
GATES_PASSED=""
GATES_FAILED=""
```

### Build

```bash
if [ -f Makefile ] && grep -q "^build:" Makefile; then
    make build && GATES_PASSED="$GATES_PASSED build" || GATES_FAILED="$GATES_FAILED build"
elif [ -f go.mod ]; then
    go build ./... && GATES_PASSED="$GATES_PASSED build" || GATES_FAILED="$GATES_FAILED build"
elif [ -f package.json ] && [ "$(jq -r '.scripts.build // ""' package.json 2>/dev/null)" != "" ]; then
    npm run build && GATES_PASSED="$GATES_PASSED build" || GATES_FAILED="$GATES_FAILED build"
fi
```

### Lint / static analysis

```bash
if [ -f Makefile ] && grep -q "^lint:" Makefile; then
    make lint && GATES_PASSED="$GATES_PASSED lint" || GATES_FAILED="$GATES_FAILED lint"
elif [ -f go.mod ]; then
    go vet ./... && GATES_PASSED="$GATES_PASSED vet" || GATES_FAILED="$GATES_FAILED vet"
fi
```

### Tests

```bash
if [ -f Makefile ] && grep -q "^test:" Makefile; then
    make test && GATES_PASSED="$GATES_PASSED test" || GATES_FAILED="$GATES_FAILED test"
elif [ -f go.mod ]; then
    go test ./... && GATES_PASSED="$GATES_PASSED test" || GATES_FAILED="$GATES_FAILED test"
fi
```

### Docs (if Makefile has the target)

```bash
if grep -q "^check-docs:" Makefile 2>/dev/null; then
    # Resolve the default branch — handles main / master / no-origin repos.
    DEFAULT_BRANCH=$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null) || DEFAULT_BRANCH=""
    if [ -n "$DEFAULT_BRANCH" ]; then
        # Only if docs were touched on this branch vs. its base.
        if git diff --name-only "$DEFAULT_BRANCH..HEAD" | grep -qE "\\.md$|/docs/"; then
            make check-docs && GATES_PASSED="$GATES_PASSED docs" || GATES_FAILED="$GATES_FAILED docs"
        fi
    fi
    # If no default branch is resolvable (no origin remote, detached, etc.)
    # the docs gate is skipped — better than a false fail on a real misroute.
fi
```

Record outcomes:

```bash
bd update "$ROOT_ID" --notes "gates_passed:$GATES_PASSED
gates_failed:$GATES_FAILED"
```

**Note on test failures:** if a failure is documented as a baseline
flake (in repo's CI docs), classify it as baseline-noise rather than a
new regression. Surface the distinction in the report. The formula
trusts the agent's judgment here; record the classification reasoning.

**Exit criteria:** All available gates run; pass/fail per gate recorded.
"""

[[steps]]
id = "report"
title = "Stage 4 — combined readiness report and STOP"
needs = ["contributor-check"]
description = """
Combine all stages into a single report and STOP. This formula does NOT
push, does NOT open a PR. The caller decides next steps.

```bash
ROOT_ID=$(bd mol current --json | jq -r '.molecule_id')
NOTES=$(bd show "$ROOT_ID" --json | jq -r '.[0].notes')
```

Write the report to `$REPORT_PATH`:

```markdown
# Ship readiness — branch `<branch>`

## Verdict

**<READY | BLOCKED>** — <one-sentence reason>

## Stage 1 — Simplify

- Status: <complete | reverted | skipped>
- Commits: <sha1>, <sha2>, ...

## Stage 2 — Self-review iteration

- Iterations: <N> (max 3)
- Final: blockers=<n>, majors=<n>, minors=<n>
- Status: <converged | not_converged>
- Fix commits: <sha1>, <sha2>, ...
- Key remaining findings (minors only, if any):
  - <one-line summary>
  - <one-line summary>

## Stage 3 — Mechanical gates

- Build: <pass | fail>
- Vet/Lint: <pass | fail>
- Tests: <pass | fail | baseline-flake-only>
- Docs: <pass | fail | not-touched>

<gate output snippets if anything failed>

## Recommended next steps

If READY:
- Push to your fork: `git push <fork-remote> <branch>`
- Open a PR: `gh pr create ...`
- After PR opens, watch for inline review comments and address them.

If BLOCKED:
- <action to unblock first gate>
- <action for second gate>
```

Decide verdict mechanically:

- READY only when: simplify ∈ {complete, skipped} AND review_status =
  converged AND no required gate failed
- Otherwise: BLOCKED

```bash
VERDICT="<READY | BLOCKED>"
BLOCKERS="<one-line summary of what blocks, or 'none'>"
bd update "$ROOT_ID" --notes "readiness: $VERDICT
blockers: $BLOCKERS
status: complete"
echo "[ship] Pipeline complete for branch $BRANCH"
echo "[ship]   Verdict: $VERDICT"
echo "[ship]   Path: $REPORT_PATH"
echo "[ship] STOP — push and PR open are the caller's call, not this formula's."
```

**Critical:** The formula MUST NOT run `git push` or `gh pr create`
under any circumstances. Push and PR open are explicit caller actions
gated on human review of this report.

**Exit criteria:** Report written, verdict recorded, formula stops.
"""
